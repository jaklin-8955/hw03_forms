{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
  <title>Новый пароль</title>
</head>
<body>
  <header>
    <nav class="navbar navbar-light" style="background-color: lightskyblue">
      <div class="container">
        <a class="navbar-brand" href="{% url 'posts:index' %}">
          <img src="{% static 'img/logo.png' %}" width="30" height="30" class="d-inline-block align-top" alt="">
          <span style="color:red">Ya</span>tube
        </a>
      </div>
    </nav>
  </header>
  <main>
    <div class="container py-5">
      {% if validlink %}
        <div class="row justify-content-center">
          <div class="col-md-8 p-5">
            <div class="card">
              <div class="card-header">Введите новый пароль</div>
              <div class="card-body">
                <form method="post">
                  {% csrf_token %}
                  {{ form.as_p }}
                  <div class="col-md-6 offset-md-4">
                    <button type="submit" class="btn btn-primary">Назначить новый пароль</button>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </div>
      {% else %}
        <div class="row justify-content-center">
          <div class="col-md-8 p-5">
            <div class="card">
              <div class="card-header">Ошибка</div>
              <div class="card-body">
                <p>Ссылка сброса пароля содержит ошибку или устарела.</p>
              </div>
            </div>
          </div>
        </div>
      {% endif %}
    </div>
  </main>
  <footer class="border-top text-center py-3">
    <p>© 2021 Copyright <span style="color:red">Ya</span>tube</p>
  </footer>
</body>
</html>
